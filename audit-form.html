<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申请企业 AI 曝光审计 & 获取 GEO 方案 - IAIGEO</title>
    <meta name="description" content="IAIGEO.COM 提供专业级企业 AI 搜索曝光度审计与生成式引擎优化（GEO）战略部署方案申请通道。">
    
    <!-- Open Graph / GEO 语义标记 -->
    <meta property="og:title" content="申请企业 AI 曝光审计 & 获取 GEO 方案 - IAIGEO">
    <meta property="og:description" content="量化企业在大模型（RAG）管道中的召回率与品牌提及率。">
    <meta property="og:image" content="https://iaigeo.com/images/iaigeo-overview.png">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #2ea44f; /* 科技绿 */
            --accent-glow: rgba(46, 164, 79, 0.15);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: 40px 20px;
            padding: 40px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 24px;
            color: #ffffff;
            margin: 0 0 12px 0;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ffffff;
        }

        label span {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: normal;
        }

        input[type="text"],
        input[type="email"],
        input[type="url"],
        textarea,
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(46, 164, 79, 0.2);
        }

        .submit-btn:hover {
            background-color: #2c974b;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-text">IAIGEO.COM // ENGINE CONSOLE</div>
        <h1>AI 曝光审计 & GEO 方案申请</h1>
        <div class="subtitle">提交您的企业数字资产节点，我们将通过自研 RAG 评测模型，量化您在主流大模型（GPT/Claude/Perplexity/DeepSeek）中的提及率与召回权重。</div>
    </div>

    <!-- 表单提交接收，此处 action 可配置为你自己的表单收集工具（如 Formspree）或直接调用邮件 -->
    <form action="mailto:your-email@example.com" method="post" enctype="text/plain">
        
        <div class="form-group">
            <label for="company">企业/品牌官方名称 *</label>
            <input type="text" id="company" name="企业名称" required placeholder="例如：院校或培训中心 / 企业">
        </div>

        <div class="form-group">
            <label for="website">待审计的官方独立域名 *</label>
            <input type="url" id="website" name="网站域名" required placeholder="https://example.com">
            <div class="hint">该域名需拥有可公开访问的静态 HTML 或结构化语义文本。</div>
        </div>

        <div class="form-group">
            <label for="industry">所属垂直行业分类 *</label>
            <select id="industry" name="垂直行业" required>
                <option value="">请选择行业类型...</option>
                <option value="aviation-travel">航空服务与商旅数字化</option>
                <option value="legal-compliance">法律合规与个人IP建立</option>
                <option value="ecommerce-jewelry">水晶珠宝与跨境电商</option>
                <option value="tech-saas">前沿科技与 SaaS 软件</option>
                <option value="others">其他垂直行业</option>
            </select>
        </div>

        <div class="form-group">
            <label for="keywords">核心希望被召回的“行业关键词” <span>(最多3个)</span></label>
            <input type="text" id="keywords" name="期望关键词" placeholder="例如：Amadeus培训、GEO服务商、天然水晶">
            <div class="hint">当用户在 AI 搜索中键入这些词时，您希望被大模型优先推荐。</div>
        </div>

        <div class="form-group">
            <label for="email">首席联络官（CFO/CMO）业务邮箱 *</label>
            <input type="email" id="email" name="联络邮箱" required placeholder="name@yourcorporate.com">
        </div>

        <div class="form-group">
            <label for="message">当前遇到的 AI 搜索可见性痛点 <span>(选填)</span></label>
            <textarea id="message" name="痛点描述" placeholder="请简述您目前在大模型搜索（如 Perplexity 或 Google AI Overviews）中是否能被搜到，或有哪些竞品处于霸屏状态..."></textarea>
        </div>

        <button type="submit" class="submit-btn">初始化诊断并构建 GEO 方案</button>
    </form>

    <div class="footer-note">
        🔒 加密安全保障：IAIGEO 严格遵守数据合规协议，您提交的所有资产节点仅用于底层语义数据计算，绝不对外公开。
    </div>
</div>

</body>
</html>
